<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="utf-8">
        <title>{% block title %}Форум{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    </head>
    <body>
        <header class="p-3 bg-dark text-white">
    <div class="container">
      <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">

        <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
          <li><a href="#" class="nav-link px-2 text-secondary">Головна</a></li>
        </ul>

        <div class="text-end">
            {% if user.is_authenticated %}
            <span class="text-white">{{ user.username }}</span>
            <a class="btn btn-outline-light me-2" href="#" role="button">Вихід</a>
            {% else %}
            <a class="btn btn-outline-light me-2" href="#" role="button">Вхід</a>
          <a class="btn btn-warning" href="#" role="button">Реєстрація</a>
            {% endif %}
          
        </div>
      </div>
    </div>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    </body>
</html>
